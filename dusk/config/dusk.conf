# Dusk — Device Configuration
# Edit this file with your Spotify credentials and preferences.

# ── Spotify ───────────────────────────────────────────────────────────────────
LIBRESPOT_NAME="Dusk"
LIBRESPOT_BITRATE="320"
LIBRESPOT_USERNAME="your_spotify_email@example.com"
LIBRESPOT_PASSWORD="your_spotify_password"

# ── Audio ─────────────────────────────────────────────────────────────────────
AUDIO_OUTPUT="headphone"        # headphone | bluetooth
DEFAULT_VOLUME=60               # 0-100

# ── Display ───────────────────────────────────────────────────────────────────
SCREEN_BRIGHTNESS=80            # 0-100 (if PWM backlight supported)
SHOW_CLOCK=false                # Show clock when idle

# ── Network ───────────────────────────────────────────────────────────────────
# WiFi is configured via raspi-config or /etc/wpa_supplicant/wpa_supplicant.conf
# eSIM activation handled separately in v2

# ── Device ────────────────────────────────────────────────────────────────────
DEVICE_NAME="Dusk"
HARDWARE_VERSION="v0"
COLORWAY="chalk"
